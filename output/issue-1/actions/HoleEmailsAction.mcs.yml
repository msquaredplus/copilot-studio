mcs.metadata:
  componentName: rechnungs_ocr_automatisierung_HoleEmailsAction
kind: TaskDialog
displayName: HoleEmailsAction
inputs:
  - name: subjectFilter
    type: string
    required: false
    defaultValue: Rechnung
  - name: folderPath
    type: string
    required: false
    defaultValue: Inbox
  - name: top
    type: number
    required: false
    defaultValue: 10
outputs:
  - name: emails
    type: array
  - name: attachments
    type: array
actions:
  - kind: InvokeConnectorTaskAction
    id: action_get_emails
    resultVariable: Dialog.emailsRaw
    connectionReference:
      logicalName: shared_office365
    operationId: GetEmails_V3
    parameters:
      folderPath: =$inputs.folderPath
      subject: =$inputs.subjectFilter
      top: =$inputs.top
      fetchOnlyWithAttachment: true
      importance: Any
  - kind: SetVariable
    id: set_output_emails
    variable: $outputs.emails
    value: =Dialog.emailsRaw.value
  - kind: SetVariable
    id: set_output_attachments
    variable: $outputs.attachments
    value: =Filter(Dialog.emailsRaw.value, HasAttachments = true)
