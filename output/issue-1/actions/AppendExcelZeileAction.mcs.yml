# KONFIGURATION erforderlich (Power Platform Environment Variables):
#   SHAREPOINT_SITE_URL  — z.B. https://firma.sharepoint.com/sites/Buchhaltung
#   EXCEL_FILE_PATH      — z.B. /Freigegebene Dokumente/Rechnungen.xlsx
#   EXCEL_TABLE_NAME     — Name der formatierten Excel-Tabelle im Sheet "Rechnungen"
#                          (Excel-Tabelle muss als Tabelle formatiert sein, nicht nur Sheet!)
# Spaltenüberschriften in Excel müssen exakt lauten:
#   Rechnungsnummer | Fälligkeitsdatum | VIN | Fehler
mcs.metadata:
  componentName: rechnungs_ocr_automatisierung_AppendExcelZeileAction
kind: TaskDialog
displayName: AppendExcelZeileAction
inputs:
  - name: rechnungsnummer
    type: string
    required: true
  - name: faelligkeitsdatum
    type: string
    required: true
  - name: currentFgstnr17
    type: string
    required: true
  - name: fehlerBeschreibung
    type: string
    required: false
    defaultValue: ""
outputs:
  - name: success
    type: boolean
  - name: rowId
    type: string
actions:
  - kind: InvokeConnectorTaskAction
    id: action_append_row
    resultVariable: Dialog.appendResult
    connectionReference:
      logicalName: shared_excelonlinebusiness
    operationId: AddTableRow
    parameters:
      source: SharePoint
      drive: =Global.sharepointSiteUrl
      file: =Global.excelFilePath
      table: =Global.excelTableName
      item:
        Rechnungsnummer: =$inputs.rechnungsnummer
        Fälligkeitsdatum: =$inputs.faelligkeitsdatum
        VIN: =$inputs.currentFgstnr17
        Fehler: =$inputs.fehlerBeschreibung
  - kind: SetVariable
    id: expose_success
    variable: $outputs.success
    value: =Not(IsBlank(Dialog.appendResult.id))
  - kind: SetVariable
    id: expose_rowid
    variable: $outputs.rowId
    value: =Dialog.appendResult.id
