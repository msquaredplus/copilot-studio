# Custom connector required: Azure AI Document Intelligence
# Connector setup: see INTEGRATION.md → Schritt 3
# Expected connector response schema:
#   { rechnungsnummer: string, faelligkeitsdatum: string, success: boolean, error: string }
# The connector's response mapping (in Power Platform custom connector swagger)
# extracts keyValuePairs from prebuilt-layout page 1 and maps:
#   key "RECHNUNG-Nummer.:" → rechnungsnummer
#   key "Fälligkeit:"       → faelligkeitsdatum
mcs.metadata:
  componentName: rechnungs_ocr_automatisierung_OcrSeite1Action
kind: TaskDialog
displayName: OcrSeite1Action
inputs:
  - name: documentBase64
    type: string
    required: true
outputs:
  - name: success
    type: boolean
  - name: rechnungsnummer
    type: string
  - name: faelligkeitsdatum
    type: string
  - name: error
    type: string
actions:
  - kind: SetVariable
    id: init_success
    variable: Dialog.ocrSuccess
    value: =false
  - kind: SetVariable
    id: init_error
    variable: Dialog.ocrError
    value: ""
  - kind: InvokeConnectorTaskAction
    id: action_ocr_seite1
    resultVariable: Dialog.ocrResult
    connectionReference:
      logicalName: <azure_document_intelligence_custom_connector>
    operationId: AnalyzeDocumentPage1
    parameters:
      documentBase64: =$inputs.documentBase64
      modelId: prebuilt-layout
      pages: "1"
      features: ocrHighResolution
  - kind: ConditionGroup
    id: cond_ocr1_response
    conditions:
      - id: cond_ocr1_ok
        condition: =Not(IsBlank(Dialog.ocrResult.rechnungsnummer))
        actions:
          - kind: SetVariable
            id: set_success_true
            variable: Dialog.ocrSuccess
            value: =true
    elseActions:
      - kind: SetVariable
        id: set_error_msg
        variable: Dialog.ocrError
        value: =If(IsBlank(Dialog.ocrResult.error), "Felder nicht gefunden auf Seite 1", Dialog.ocrResult.error)
  - kind: SetVariable
    id: expose_success
    variable: $outputs.success
    value: =Dialog.ocrSuccess
  - kind: SetVariable
    id: expose_rechnungsnummer
    variable: $outputs.rechnungsnummer
    value: =Dialog.ocrResult.rechnungsnummer
  - kind: SetVariable
    id: expose_faelligkeitsdatum
    variable: $outputs.faelligkeitsdatum
    value: =Dialog.ocrResult.faelligkeitsdatum
  - kind: SetVariable
    id: expose_error
    variable: $outputs.error
    value: =Dialog.ocrError
