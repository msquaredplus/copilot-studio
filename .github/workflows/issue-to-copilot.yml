name: Copilot Studio Pipeline

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       github.event.comment.user.login != 'github-actions[bot]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for copilot-studio label
        id: check_label
        run: |
          LABELS=$(gh issue view ${{ github.event.issue.number || github.event.issue.number }} --json labels --jq '[.labels[].name] | join(",")')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          if echo "$LABELS" | grep -q "copilot-studio"; then
            echo "should_process=true" >> $GITHUB_OUTPUT
          else
            echo "should_process=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude CLI
        if: steps.check_label.outputs.should_process == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install pipeline dependencies
        if: steps.check_label.outputs.should_process == 'true'
        run: cd scripts && npm install

      - name: Resolve issue data
        if: steps.check_label.outputs.should_process == 'true'
        id: issue_data
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json number,title,body,comments)
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          ISSUE_COMMENTS=$(echo "$ISSUE_JSON" | jq -r '[.comments[] | select(.author.login != "github-actions[bot]") | .body] | join("\n---\n")')
          echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          # Multi-line values via env file
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUE_COMMENTS<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_COMMENTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run agent pipeline
        if: steps.check_label.outputs.should_process == 'true'
        run: node scripts/run-pipeline.js
        env:
          CLAUDE_BIN: claude
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue_data.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue_data.outputs.title }}
          REPO: ${{ github.repository }}
